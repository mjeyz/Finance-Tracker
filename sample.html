<link rel="stylesheet" href="styles.css">



<div class="display-panel">
    <span class="dynamicTitle">Transaction History</span>
    <div class="transition-history">
        <div class="transaction-list">
            <div class="transaction-item">
                <div style="width: 42px; height: 42px; background: #E0E7FF; border-radius: 20%; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                         fill="#9b1212" viewBox="0 0 24 24">
                        <path d="M13 18v-6h4l-5-6-5 6h4v6z"></path>
                    </svg>
                </div>
                <div style="flex: 1; min-width: 0;">
                    <p style="margin: 0; font-size: 14px; font-weight: 500; color: #3B3B3B;">Transport</p>
                    <span style="font-size: 12px; color: #888;">2026-05-18</span>
                </div>

                <!-- 3. Amount -->
                <span style="white-space: nowrap; color: #c0786a; font-size: 14px; font-weight: 500;">-Rs 800</span>
            </div>
            <div class="transaction-item">Groceries</div>
            <div class="transaction-item">University Fee</div>
            <div class="transaction-item">Hotel Rent</div>

            <button class="add-transaction">+ Add Transaction</button>
        </div>
    </div>

    <div class="events-list">
        <div class="event-item">
            <div style="flex: 1; min-width: 0; border-left: 5px solid orangered; border-radius: 4px; padding-left: 10px">
                <p style="margin: 0; font-size: 14px;font-weight: 500; color: #3B3B3B">Group Project printing</p>
                <span style="font-size: 12px; color: #888;">26-5-21</span>
            </div>
            <div style="white-space: nowrap;">
                <span style="font-size: 14px; font-weight: 500; color: orange">RS 400</span>
                <p style="font-size: 12px;">Mid priority</p>
            </div>
        </div>
    </div>
</div>
