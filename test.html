<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack – Sign In</title>

  <!-- Font Awesome for social icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* Reset & Base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      border: 1px solid #e9edf4;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #0b1b33;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .logo span {
      color: #2a7de1;
    }

    .subhead {
      color: #64748b;
      font-size: 15px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .form-group input[type="email"],
    .form-group input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      background: #fafbfc;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #2a7de1;
      box-shadow: 0 0 0 4px rgba(42, 125, 225, 0.10);
      background: #ffffff;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 6px 0 24px;
    }

    .form-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #334155;
      cursor: pointer;
    }

    .form-row label input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #2a7de1;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 14px;
      color: #2a7de1;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #0b1b33;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: #1a2f4e;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0 24px;
      color: #94a3b8;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .social-row {
      display: flex;
      gap: 12px;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      background: #ffffff;
      font-size: 14px;
      font-weight: 500;
      color: #1e293b;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
    }

    .social-btn:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    .social-btn i {
      font-size: 18px;
    }

    .signup-row {
      text-align: center;
      margin-top: 28px;
      font-size: 15px;
      color: #475569;
    }

    .signup-row a {
      color: #2a7de1;
      font-weight: 600;
      text-decoration: none;
    }

    .signup-row a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 32px 20px;
        border-radius: 16px;
        margin: 16px;
      }
      .social-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Logo -->
    <div class="logo">Fin<span>Track</span></div>
    <p class="subhead">Welcome back! Sign in to your account</p>

    <!-- Form -->
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>

      <div class="form-row">
        <label>
          <input type="checkbox" id="remember" /> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <!-- OR Divider -->
    <div class="divider">OR CONTINUE WITH</div>

    <!-- Social Buttons -->
    <div class="social-row">
      <a href="#" class="social-btn"><i class="fab fa-google"></i> Google</a>
      <a href="#" class="social-btn"><i class="fab fa-facebook"></i> Facebook</a>
      <a href="#" class="social-btn"><i class="fab fa-github"></i> GitHub</a>
    </div>

    <!-- Sign Up -->
    <div class="signup-row">
      Don't have an account? <a href="#">Create one</a>
    </div>
  </div>

  <script>
    // Simple form handler – replace with your own logic
    function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const remember = document.getElementById('remember').checked;

      if (!email || !password) {
        alert('Please fill in both email and password.');
        return false;
      }

      console.log('Login attempt:', { email, remember });
      alert('Sign-in successful! (This is a demo)');
      return false;
    }
  </script>

</body>
</html>
