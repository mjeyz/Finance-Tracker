<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Draggable Form Modal</title>

    <!-- Font Awesome for icons -->
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Dashboard ── */
        .dashboard {
            width: 1100px;
            max-width: 94%;
            padding: 2rem;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            transition: filter 0.4s ease;
            position: relative;
            z-index: 1;
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .dashboard-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0b1a33;
            letter-spacing: -0.5px;
        }

        .dashboard-header h1 i {
            color: #4f6ef7;
            margin-right: 10px;
        }

        .add-btn {
            background: #4f6ef7;
            border: none;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.75rem 1.8rem;
            border-radius: 60px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(79, 110, 247, 0.3);
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }

        .add-btn:hover {
            background: #3a56d4;
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(79, 110, 247, 0.4);
        }

        .add-btn:active {
            transform: scale(0.96);
        }

        .add-btn i {
            font-size: 1.1rem;
        }

        /* ── Dashboard Cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: #f8faff;
            padding: 1.5rem 1.2rem;
            border-radius: 20px;
            border: 1px solid #e9edf4;
            text-align: center;
            transition: border 0.2s;
        }

        .stat-card:hover {
            border-color: #4f6ef7;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #0b1a33;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: #6b7a8f;
            margin-top: 4px;
        }

        .stat-card .icon {
            color: #4f6ef7;
            font-size: 1.5rem;
            margin-bottom: 6px;
        }

        .chart-placeholder {
            background: #f8faff;
            border-radius: 20px;
            border: 1px solid #e9edf4;
            padding: 2.5rem 2rem;
            text-align: center;
            color: #6b7a8f;
            font-size: 0.95rem;
        }

        .chart-placeholder i {
            font-size: 2.2rem;
            color: #d0d9e8;
            margin-bottom: 10px;
            display: block;
        }

        /* ── Overlay (blur background) ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 26, 51, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* ── Draggable Form Modal ── */
        .modal {
            background: #ffffff;
            border-radius: 28px;
            width: 520px;
            max-width: 92%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transform: scale(0.92) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
            opacity 0.3s ease;
            opacity: 0;
            cursor: default;
            user-select: none;
            /* prevent text selection while dragging */;
        }

        .overlay.active .modal {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* ── Modal Header (drag handle) ── */
        .modal-header {
            padding: 1.2rem 1.8rem;
            background: #f8faff;
            border-bottom: 1px solid #e9edf4;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: grab;
            transition: background 0.15s;
        }

        .modal-header:active {
            cursor: grabbing;
        }

        .modal-header:hover {
            background: #f0f5ff;
        }

        .modal-header .title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #0b1a33;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header .title i {
            color: #4f6ef7;
        }

        .modal-header .close-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #8a9bb0;
            cursor: pointer;
            padding: 0 6px;
            transition: color 0.2s, transform 0.15s;
            line-height: 1;
        }

        .modal-header .close-btn:hover {
            color: #e74c3c;
            transform: rotate(90deg);
        }

        /* ── Modal Body (form) ── */
        .modal-body {
            padding: 1.8rem 1.8rem 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1f2a44;
            margin-bottom: 5px;
        }

        .form-group label .required {
            color: #e74c3c;
            margin-left: 2px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #fafcff;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
            color: #0b1a33;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #4f6ef7;
            box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.12);
            background: #ffffff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            margin-top: 1.8rem;
            padding-top: 1.2rem;
            border-top: 1px solid #e9edf4;
        }

        .form-actions .btn {
            padding: 0.6rem 1.8rem;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .form-actions .btn:active {
            transform: scale(0.96);
        }

        .btn-secondary {
            background: #eef2f7;
            color: #1f2a44;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-primary {
            background: #4f6ef7;
            color: #fff;
            box-shadow: 0 6px 20px rgba(79, 110, 247, 0.25);
        }

        .btn-primary:hover {
            background: #3a56d4;
        }

        /* ── Drag ghost indicator ── */
        .modal.dragging {
            transition: none !important;
            cursor: grabbing;
        }

        .modal.dragging .modal-header {
            cursor: grabbing;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .dashboard {
                padding: 1.2rem;
            }

            .dashboard-header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .add-btn {
                justify-content: center;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .modal-body {
                padding: 1.2rem;
            }

            .modal-header {
                padding: 1rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<!-- ═══ DASHBOARD ═══ -->
<div class="dashboard" id="dashboard">

    <div class="dashboard-header">
        <h1><i class="fas fa-chart-pie"></i> Dashboard</h1>
        <button class="add-btn" id="openModalBtn">
            <i class="fas fa-plus"></i> Add New
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="icon"><i class="fas fa-users"></i></div>
            <div class="number">1,284</div>
            <div class="label">Total Users</div>
        </div>
        <div class="stat-card">
            <div class="icon"><i class="fas fa-shopping-cart"></i></div>
            <div class="number">342</div>
            <div class="label">Orders</div>
        </div>
        <div class="stat-card">
            <div class="icon"><i class="fas fa-dollar-sign"></i></div>
            <div class="number">$12.4k</div>
            <div class="label">Revenue</div>
        </div>
        <div class="stat-card">
            <div class="icon"><i class="fas fa-rocket"></i></div>
            <div class="number">87%</div>
            <div class="label">Growth</div>
        </div>
    </div>

    <div class="chart-placeholder">
        <i class="fas fa-chart-bar"></i>
        <span>📊 Your recent activity will appear here</span>
    </div>
</div>

<!-- ═══ OVERLAY (blur backdrop) ═══ -->
<div class="overlay" id="overlay">

    <!-- ═══ DRAGGABLE FORM MODAL ═══ -->
    <div class="modal" id="modal">

        <!-- Header = drag handle -->
        <div class="modal-header" id="modalHeader">
            <div class="title">
                <i class="fas fa-file-alt"></i> Create New Entry
            </div>
            <button class="close-btn" id="closeModalBtn" aria-label="Close">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Body = form -->
        <div class="modal-body">
            <form id="entryForm" novalidate>

                <div class="form-group">
                    <label for="title">Title <span class="required">*</span></label>
                    <input type="text" id="title" placeholder="e.g. Project Alpha" required/>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="work">Work</option>
                            <option value="personal">Personal</option>
                            <option value="finance">Finance</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Write a short note…"></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check"></i> Submit
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    (function () {
        'use strict';

        // ── DOM refs ──
        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('modal');
        const modalHeader = document.getElementById('modalHeader');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const form = document.getElementById('entryForm');

        // ── Open / Close ──
        function openModal() {
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // prevent scroll
            // Reset any lingering drag transforms
            modal.style.transform = '';
        }

        function closeModal() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            // Reset form (optional)
            // form.reset();
        }

        // ── Event listeners for open/close ──
        openBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);

        // Click on overlay background closes modal (but not if click inside modal)
        overlay.addEventListener('click', function (e) {
            if (e.target === overlay) {
                closeModal();
            }
        });

        // ESC key closes
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && overlay.classList.contains('active')) {
                closeModal();
            }
        });

        // ── DRAG LOGIC ──
        let isDragging = false;
        let offsetX = 0;
        let offsetY = 0;
        let startX = 0;
        let startY = 0;

        // We'll store the modal's current position as transform values
        let currentX = 0;
        let currentY = 0;

        modalHeader.addEventListener('mousedown', function (e) {
            // Only left-click
            if (e.button !== 0) return;

            // Don't start drag if the click is on the close button or its children
            const target = e.target.closest('.close-btn');
            if (target) return;

            isDragging = true;
            modal.classList.add('dragging');

            // Get the current transform values (if any)
            const style = window.getComputedStyle(modal);
            const transform = style.transform;
            if (transform && transform !== 'none') {
                const matrix = transform.match(/matrix.*\((.+)\)/);
                if (matrix) {
                    const values = matrix[1].split(', ').map(Number);
                    // matrix(scaleX, skewY, skewX, scaleY, tx, ty)
                    currentX = values[4] || 0;
                    currentY = values[5] || 0;
                }
            }

            // Mouse position relative to the modal
            const rect = modal.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            // Store starting mouse position for calculating delta
            startX = e.clientX;
            startY = e.clientY;

            // Prevent text selection while dragging
            document.body.style.userSelect = 'none';

            e.preventDefault();
        });

        document.addEventListener('mousemove', function (e) {
            if (!isDragging) return;

            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;

            // Apply the new position
            const newX = currentX + deltaX;
            const newY = currentY + deltaY;

            modal.style.transform = `translate(${newX}px, ${newY}px)`;

            // Keep the modal within viewport (optional but nice)
            // We'll just let it go anywhere for simplicity
        });

        document.addEventListener('mouseup', function (e) {
            if (isDragging) {
                isDragging = false;
                modal.classList.remove('dragging');
                document.body.style.userSelect = '';

                // Update currentX/Y to match the final transform
                const style = window.getComputedStyle(modal);
                const transform = style.transform;
                if (transform && transform !== 'none') {
                    const matrix = transform.match(/matrix.*\((.+)\)/);
                    if (matrix) {
                        const values = matrix[1].split(', ').map(Number);
                        currentX = values[4] || 0;
                        currentY = values[5] || 0;
                    }
                } else {
                    currentX = 0;
                    currentY = 0;
                }
            }
        });

        // ── Handle form submission ──
        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            if (!title) {
                alert('Please enter a title.');
                return;
            }

            // Collect data
            const data = {
                title: title,
                category: document.getElementById('category').value,
                status: document.getElementById('status').value,
                description: document.getElementById('description').value.trim(),
            };

            console.log('📦 Form submitted:', data);

            // Show a quick success feedback
            const btn = form.querySelector('.btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Done!';
            btn.style.background = '#27ae60';
            btn.style.boxShadow = '0 6px 20px rgba(39, 174, 96, 0.3)';

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '';
                btn.style.boxShadow = '';
                closeModal();
                form.reset();
                // Reset drag position (optional – return modal to center)
                modal.style.transform = '';
                currentX = 0;
                currentY = 0;
            }, 800);
        });

        // ── Reset modal position when closed ──
        // We want the modal to re-center when opened again.
        // We'll store the original transform and reset on open.
        const originalTransform = modal.style.transform;

        // Override openModal to reset position
        const originalOpen = openModal;
        openModal = function () {
            // Reset transform to center
            modal.style.transform = '';
            currentX = 0;
            currentY = 0;
            originalOpen.call(this);
        };

        // Re-bind the open button
        openBtn.removeEventListener('click', openModal);
        openBtn.addEventListener('click', openModal);

        console.log('✅ Draggable modal ready! Drag the header to move it.');
    })();
</script>

</body>
</html>
