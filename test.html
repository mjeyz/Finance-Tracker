<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search bar with icon</title>

    <!-- Font Awesome for icons (free) -->
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
        /* ---------- reset & base ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4f9;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            gap: 2.5rem;
        }

        h2 {
            font-weight: 500;
            color: #1e293b;
            letter-spacing: -0.01em;
            border-bottom: 2px solid #cbd5e1;
            padding-bottom: 0.3rem;
            margin-bottom: 0.5rem;
        }

        .demo-wrapper {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 1.8rem 2rem 2rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.2s;
        }

        .demo-wrapper:hover {
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
        }

        /* ---- divider ---- */
        .divider {
            margin: 1.2rem 0 0.8rem;
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, #e2e8f0, transparent);
        }

        /* ---- all search groups use flex and relative positioning ---- */
        .search-group {
            position: relative;
            display: flex;
            align-items: center;
            width: 50%;
        }

        /* base input style */
        .search-input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 3rem;
            /* extra left space for the icon */
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
            background: white;
            transition: border-color 0.25s, box-shadow 0.25s;
            outline: none;
            color: #0f172a;
        }

        .search-input::placeholder {
            color: #94a3b8;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .search-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* ---- 1. icon as background-image (pure CSS) ---- */
        .search-bg-icon {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%2364748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>');
            background-repeat: no-repeat;
            background-position: 1.2rem center;
            background-size: 1.2rem;
            padding-left: 3.4rem;
            /* keep space for icon */
        }

        /* ---- 2. icon with ::before pseudo-element ---- */
        .search-pseudo-wrapper {
            position: relative;
            width: 100%;
        }

        .search-pseudo-wrapper .search-input {
            padding-left: 3.2rem;
        }

        .search-pseudo-wrapper::before {
            content: "\f002";
            /* Font Awesome search icon unicode */
            font-family: "Font Awesome 6 Free",serif;
            font-weight: 900;
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
            pointer-events: none;
            z-index: 2;
            transition: color 0.2s;
        }

        .search-pseudo-wrapper:focus-within::before {
            color: #3b82f6;
        }

        /* ---- 3. icon as separate <i> element (flex layout) ---- */
        .search-icon-element {
            position: relative;
            width: 100%;
        }

        .search-icon-element .search-input {
            padding-left: 3.2rem;
        }

        .search-icon-element .icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
            pointer-events: none;
            transition: color 0.2s;
            z-index: 2;
        }

        .search-icon-element:focus-within .icon {
            color: #3b82f6;
        }

        /* ---- extra: a clear button inside (optional) ---- */
        .search-group .clear-btn {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            border-radius: 40px;
            transition: background 0.2s, color 0.2s;
            display: none;
            /* hidden by default, shown with JS */
            z-index: 3;
        }

        .search-group .clear-btn:hover {
            background: #f1f5f9;
            color: #1e293b;
        }

        .search-group .clear-btn.visible {
            display: block;
        }

        /* small note */
        .footnote {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.2rem;
            text-align: center;
            opacity: 0.7;
        }

        .footnote i {
            margin: 0 2px;
        }
    </style>
</head>
<body>

    <!-- ========== DEMO 1 : Background image ========== -->
    <div class="demo-wrapper">
        <h2><i class="fas fa-image" style="margin-right: 0.5rem; color:#3b82f6;"></i> Background-image</h2>
        <div class="search-group">
            <input
            type="text"
            class="search-input search-bg-icon"
            placeholder="Search with SVG icon..."
            />
        </div>
        <hr class="divider" />
        <p class="footnote">
            <i class="fas fa-code"></i> Icon set via <code>background-image</code> (inline SVG)
        </p>
    </div>

    <!-- ========== DEMO 2 : ::before pseudo-element ========== -->
    <div class="demo-wrapper">
        <h2><i class="fas fa-magic" style="margin-right: 0.5rem; color:#8b5cf6;"></i> Pseudo-element</h2>
        <div class="search-group search-pseudo-wrapper">
            <input
            type="text"
            class="search-input"
            placeholder="Search with ::before..."
            />
        </div>
        <hr class="divider" />
        <p class="footnote">
            <i class="fas fa-code"></i> Icon via <code>::before</code> + Font Awesome
        </p>
    </div>

    <!-- ========== DEMO 3 : separate <i> element ========== -->
    <div class="demo-wrapper">
        <h2><i class="fas fa-cube" style="margin-right: 0.5rem; color:#f97316;"></i> Separate element</h2>
        <div class="search-group search-icon-element">
            <i class="fas fa-search icon"></i>
            <input
            type="text"
            class="search-input"
            id="searchInput3"
            placeholder="Search with icon element..."
            />
            <!-- optional clear button -->
            <button class="clear-btn" id="clearBtn3" aria-label="clear">
                <i class="fas fa-times-circle"></i>
            </button>
        </div>
        <hr class="divider" />
        <p class="footnote">
            <i class="fas fa-code"></i> Icon as <code>&lt;i&gt;</code> with absolute positioning
            <span style="display:inline-block; margin-left:0.8rem;">
                <i class="fas fa-eraser" style="color:#ef4444;"></i> clear button (JS)
            </span>
        </p>
    </div>

    <script>
        // ---- optional: clear button functionality for demo 3 ----
        const input3 = document.getElementById('searchInput3');
        const clearBtn = document.getElementById('clearBtn3');

        // show/hide clear button based on input value
        input3.addEventListener('input', function() {
            if (this.value.length > 0) {
                clearBtn.classList.add('visible');
            } else {
                clearBtn.classList.remove('visible');
            }
        });

        clearBtn.addEventListener('click', function() {
            input3.value = '';
            input3.focus();
            this.classList.remove('visible');
            // dispatch input event to let any other listener know
            input3.dispatchEvent(new Event('input'));
        });

        // ---- also add clear to demo 1 & 2 (optional) but we keep it simple ----
        // you can extend the same pattern if you like.
        console.log('🔍 Search bar demos ready.');
    </script>

</body>
</html>
